<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RollCall Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "primary-hover": "#0e4bce",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile view */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Background Pattern for visual interest without clutter -->
<div class="absolute top-0 left-0 w-full h-full opacity-40 pointer-events-none z-0">
<div class="absolute top-[-20%] right-[-10%] w-[80%] h-[50%] bg-gradient-to-br from-primary/20 to-transparent rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-[80%] h-[50%] bg-gradient-to-tr from-primary/10 to-transparent rounded-full blur-3xl"></div>
</div>
<!-- Main Container -->
<div class="relative w-full max-w-[400px] z-10 flex flex-col items-center">
<!-- Header / Logo -->
<div class="mb-10 text-center">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-4xl">check_circle</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">RollCall</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Smart Attendance System</p>
</div>
<!-- Form Section -->
<div class="w-full bg-white dark:bg-[#1A2232] rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 md:p-8">
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<div class="relative group">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="flex h-12 w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent px-3 py-2 pl-10 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent disabled:cursor-not-allowed disabled:opacity-50 transition-all text-slate-900 dark:text-white" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="text-sm font-medium leading-none text-slate-700 dark:text-slate-300" for="password">Password</label>
</div>
<div class="relative group">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="flex h-12 w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent px-3 py-2 pl-10 pr-10 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent disabled:cursor-not-allowed disabled:opacity-50 transition-all text-slate-900 dark:text-white" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative inline-flex items-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-9 h-5 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/50 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</div>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary-hover hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 inline-flex items-center justify-center rounded-lg bg-primary px-6 font-medium text-white shadow-md shadow-primary/20 hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark transition-all active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
<!-- Social Login Divider -->
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-700"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-[#1A2232] px-2 text-slate-500">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="inline-flex items-center justify-center h-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-transparent px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-200 transition-all" type="button">
<svg class="mr-2 h-4 w-4" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="inline-flex items-center justify-center h-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-transparent px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-200 transition-all" type="button">
<svg class="mr-2 h-5 w-5 fill-current" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.36-1.09-.56-2.1-.48-3.08.02-.62.32-1.25.5-1.93.54-2.85.16-5.13-1.89-6.09-5.18-.81-2.77.29-6.38 3.5-7.74 1.48-.63 3.02-.45 4.36.27.7.38 1.48.51 2.22.18 1.63-.73 3.65-.48 5.16.89 1.43 1.3 2.14 3.03 2.14 3.03s-1.74.83-2.15 2.76c-.36 1.7.99 2.92 1.37 3.34-.69 2.15-1.71 3.54-2.42 4.14zM12.02 3.16c.13 1.95-1.42 3.79-3.23 3.97-1.57.16-3.27-1.53-3.16-3.52.12-2.18 2.37-4.06 4.14-3.66.52 1.74 1.69 2.71 2.25 3.21z"></path>
</svg>
                    Apple
                </button>
</div>
</div>
<!-- Footer / Sign Up -->
<div class="mt-8 text-center z-10">
<p class="text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="font-medium text-primary hover:text-primary-hover hover:underline transition-colors" href="#">Create an Account</a>
</p>
</div>
</div>
</body></html>
