<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Face + Location Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .camera-overlay {
            background: radial-gradient(ellipse at center, transparent 35%, rgba(16, 22, 34, 0.6) 36%, rgba(16, 22, 34, 0.9) 100%);
        }
        .scan-line {
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden mx-auto max-w-md bg-white dark:bg-background-dark shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center justify-between p-4 pb-2 bg-white dark:bg-background-dark z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] text-center">Verification</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Stepper -->
<div class="px-6 py-4 bg-white dark:bg-background-dark z-10">
<div class="flex items-center justify-center w-full">
<!-- Step 1: Location (Done) -->
<div class="flex flex-col items-center gap-1 group">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-green-500 text-white">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<span class="text-xs font-medium text-green-600 dark:text-green-400">Location</span>
</div>
<!-- Connector 1 -->
<div class="h-0.5 w-16 bg-green-500 mx-2 -mt-4 rounded-full"></div>
<!-- Step 2: Face Scan (Active) -->
<div class="flex flex-col items-center gap-1">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-white shadow-lg shadow-primary/30 ring-4 ring-primary/10">
<span class="text-xs font-bold">2</span>
</div>
<span class="text-xs font-bold text-primary">Face Scan</span>
</div>
<!-- Connector 2 -->
<div class="h-0.5 w-16 bg-slate-200 dark:bg-slate-700 mx-2 -mt-4 rounded-full"></div>
<!-- Step 3: Success (Inactive) -->
<div class="flex flex-col items-center gap-1 opacity-40">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400">
<span class="text-xs font-bold">3</span>
</div>
<span class="text-xs font-medium text-slate-500 dark:text-slate-400">Done</span>
</div>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-1 relative flex flex-col w-full h-full overflow-hidden bg-black">
<!-- Camera Feed Simulation -->
<div class="absolute inset-0 w-full h-full object-cover">
<img alt="Camera preview showing a student's face in a classroom setting" class="w-full h-full object-cover opacity-80" data-alt="Camera preview showing a student's face in a classroom setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCFg6_M4Nwx9_TiXfgxmMS02t1st-64WBN_k1i66NRV19NXxv0UKfTZ0xdPRZOHdOGdUZ1Plv1XGePiZBLDGEuoXEBH4iPexm7gEI8YQKExjglgk1K7tDkBfsZj1BBDk-oSFWzJBlsZlr5Fv-GW_Zh2MhoPKJzwQCT9tS4hLUPTNR9QQZmWsXKcmJmOHfQtZtVFaPc0E4L5FXNY41O3i4KRz6P-A49JX0WnbYItD0I3udTpwyV8O9tnurZvtuby5gn0sM34aKjQ2Z6h"/>
</div>
<!-- Dark Overlay with Cutout -->
<div class="absolute inset-0 camera-overlay pointer-events-none"></div>
<!-- Face Scanning Frame -->
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none pb-20">
<div class="relative w-64 h-80 rounded-[45%] border-2 border-primary/60 shadow-[0_0_40px_rgba(19,91,236,0.3)] overflow-hidden">
<!-- Corner Brackets -->
<div class="absolute top-4 left-4 w-6 h-6 border-l-4 border-t-4 border-white/80 rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-6 h-6 border-r-4 border-t-4 border-white/80 rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-6 h-6 border-l-4 border-b-4 border-white/80 rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 w-6 h-6 border-r-4 border-b-4 border-white/80 rounded-br-lg"></div>
<!-- Scanning Animation Line -->
<div class="absolute left-0 right-0 h-0.5 bg-primary shadow-[0_0_15px_2px_rgba(19,91,236,0.8)] scan-line"></div>
</div>
<p class="mt-6 text-white text-center font-medium drop-shadow-md px-8 text-sm opacity-90">
                    Position your face within the frame.<br/>Ensure good lighting.
                </p>
</div>
<!-- Location Status Card (Floating) -->
<div class="absolute top-4 left-4 right-4 z-20">
<div class="bg-white/95 dark:bg-slate-800/95 backdrop-blur-md rounded-xl p-3 shadow-lg border border-slate-200 dark:border-slate-700 flex items-center gap-3">
<div class="flex items-center justify-center size-10 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 shrink-0">
<span class="material-symbols-outlined">my_location</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center gap-1.5">
<h3 class="text-sm font-bold text-slate-900 dark:text-slate-100">Location Verified</h3>
<span class="material-symbols-outlined text-base text-green-500">check_circle</span>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 truncate font-mono mt-0.5">
                            40.7128° N, 74.0060° W
                        </p>
</div>
</div>
</div>
</div>
<!-- Bottom Controls -->
<div class="bg-white dark:bg-background-dark p-6 pb-8 rounded-t-2xl -mt-4 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.1)] relative">
<div class="flex items-center justify-center w-12 h-1 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6"></div>
<div class="flex items-center justify-between gap-4 mb-6 px-2">
<!-- Gallery Button (Secondary) -->
<button class="flex flex-col items-center justify-center gap-1 group">
<div class="size-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 group-hover:bg-slate-200 dark:group-hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">photo_library</span>
</div>
<span class="text-[10px] font-medium text-slate-500 uppercase tracking-wide">Upload</span>
</button>
<!-- Main Shutter Button -->
<button class="relative group cursor-pointer transform active:scale-95 transition-transform duration-100">
<div class="absolute -inset-1 bg-primary/30 rounded-full blur opacity-40 group-hover:opacity-60 transition-opacity"></div>
<div class="relative size-20 rounded-full border-[3px] border-slate-200 dark:border-slate-600 flex items-center justify-center bg-white dark:bg-background-dark">
<div class="size-16 rounded-full bg-primary flex items-center justify-center text-white shadow-lg">
<span class="material-symbols-outlined text-3xl">face</span>
</div>
</div>
</button>
<!-- Switch Camera Button (Secondary) -->
<button class="flex flex-col items-center justify-center gap-1 group">
<div class="size-12 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 group-hover:bg-slate-200 dark:group-hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">cameraswitch</span>
</div>
<span class="text-[10px] font-medium text-slate-500 uppercase tracking-wide">Flip</span>
</button>
</div>
<p class="text-xs text-center text-slate-400 dark:text-slate-500 leading-relaxed max-w-xs mx-auto">
                By tapping the button, you consent to biometric processing for attendance verification.
            </p>
</div>
</div>
</body></html>
