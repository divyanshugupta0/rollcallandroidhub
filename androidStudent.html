<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RollCall Splash Screen</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom gradient animation for a subtle effect without JS */
        @keyframes gradient-xy {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient-xy 6s ease infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased h-screen w-full overflow-hidden">
<!-- Splash Screen Container -->
<!-- Used a rich gradient background as requested: Deep blue to teal/primary -->
<div class="relative flex h-full w-full flex-col items-center justify-between bg-gradient-to-br from-[#0f172a] via-[#135bec] to-[#0ea5e9] text-white p-6 animate-gradient">
<!-- Decorative background pattern (abstract) -->
<div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 mix-blend-soft-light pointer-events-none"></div>
<div class="absolute top-[-20%] left-[-20%] w-[80%] h-[50%] bg-primary/30 blur-[100px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[40%] bg-teal-500/20 blur-[80px] rounded-full pointer-events-none"></div>
<!-- Top Spacer for vertical centering balance -->
<div class="flex-1"></div>
<!-- Central Brand Identity -->
<div class="flex flex-col items-center gap-6 z-10 flex-shrink-0">
<!-- Icon Container -->
<div class="relative flex items-center justify-center">
<!-- Outer glow ring -->
<div class="absolute inset-0 bg-white/10 rounded-full blur-xl transform scale-150"></div>
<!-- Main Logo Circle -->
<div class="relative flex h-28 w-28 items-center justify-center rounded-3xl bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl">
<!-- Fingerprint Icon representing Smart Security/Identity -->
<span class="material-symbols-outlined text-white text-[64px]" style="font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;">
                        fingerprint
                    </span>
<!-- Checkmark Badge overlapping (Smart Attendance) -->
<div class="absolute -bottom-2 -right-2 flex h-10 w-10 items-center justify-center rounded-full bg-primary border-2 border-[#135bec]/50 shadow-lg">
<span class="material-symbols-outlined text-white text-xl font-bold">
                            check
                        </span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center gap-2 mt-4">
<h1 class="text-5xl font-bold tracking-tight text-white drop-shadow-sm">RollCall</h1>
<p class="text-white/80 text-lg font-light tracking-wide">Smart Attendance System</p>
</div>
<!-- Loading Indicator (Subtle pulse) -->
<div class="mt-8 flex gap-2">
<div class="h-1.5 w-1.5 rounded-full bg-white/40 animate-[bounce_1s_infinite_100ms]"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/80 animate-[bounce_1s_infinite_200ms]"></div>
<div class="h-1.5 w-1.5 rounded-full bg-white/40 animate-[bounce_1s_infinite_300ms]"></div>
</div>
</div>
<!-- Bottom Spacer for vertical centering balance -->
<div class="flex-1"></div>
<!-- Footer / Powered By -->
<div class="z-10 pb-8 flex flex-col items-center gap-2 opacity-80">
<span class="text-xs font-light tracking-widest text-white/60 uppercase">Powered by</span>
<div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full border border-white/5 backdrop-blur-sm">
<!-- Simulated Firebase Logo using Material Icon fitting the theme -->
<span class="material-symbols-outlined text-yellow-400 text-xl" style="font-variation-settings: 'FILL' 1;">
                    whatshot
                </span>
<span class="font-medium text-white tracking-wide text-sm">Firebase</span>
</div>
</div>
</div>
</body></html>
